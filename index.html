<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Input Delivery Sunter</title>
  <link rel="preconnect" href="https://unpkg.com"/>
  <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div id="loading" class="loading-overlay" style="display:none">
    <div>Mohon Tunggu...</div>
  </div>

  <div class="app-header"><h2>Input Delivery Sunter</h2></div>

  <div class="top-section">
    <button class="btn-main btn-scan" id="btn-scan">📷 SCAN SJKB</button>
    <input type="text" id="sjkb" placeholder="Nomor SJKB" />
    <button class="btn-main btn-save" id="btn-kirim">KIRIM DATA</button>
    <div id="statusLoc" class="muted" style="font-weight:700; margin-bottom:10px;">⏳ Menyiapkan GPS...</div>

    <!-- Tombol ABSEN (NVDC) -->
    <button class="btn-main btn-absen" id="btn-absen" disabled>✅ ABSEN (NVDC)</button>

    <button class="btn-main btn-admin" id="btn-admin">📊 MENU ADMIN</button>
  </div>

  <div class="bottom-section">
    <div style="font-size: 11px; color: #999; margin-bottom: 10px; font-weight: bold;">HISTORY HARI INI</div>
    <div id="historyList"></div>
  </div>

  <div id="reader-container">
    <div id="reader"></div>
    <button class="btn-main btn-close" id="btn-cancel">BATAL</button>
  </div>

  <div id="adminPanel">
    <select id="lpFilter"></select>
    <div id="adminHistoryContent"></div>
    <button class="btn-main" id="btn-back" style="background:#6c757d; margin-top:20px;">KEMBALI</button>
  </div>

  <!-- Modal Konfirmasi Absen -->
  <div id="absen-modal" style="display:none; position:fixed; inset:0; z-index:10002; background:rgba(0,0,0,0.4);">
    <div style="max-width:520px; margin:60px auto; background:#fff; border-radius:12px; padding:16px; box-shadow:0 6px 20px rgba(0,0,0,0.2);">
      <div style="font-weight:700; font-size:16px; margin-bottom:10px;">Konfirmasi Absen (NVDC)</div>

      <div style="display:grid; grid-template-columns: 130px 1fr; gap:8px; align-items:center; margin-bottom:8px;">
        <div class="muted">Device ID</div>
        <div><input id="absen-device" type="text" readonly style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></div>

        <div class="muted">Nama Driver</div>
        <div>
          <input id="absen-nama" type="text" placeholder="(terdaftar otomatis / isi jika unknown)" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
          <div id="absen-nama-hint" class="muted" style="margin-top:4px; font-size:11px;"></div>
        </div>

        <div class="muted">LP</div>
        <div>
          <input id="absen-lp-ro" type="text" readonly style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
          <select id="absen-lp-dd" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; display:none;">
            <option value="">-- Pilih LP --</option>
          </select>
          <div id="absen-lp-hint" class="muted" style="margin-top:4px; font-size:11px; display:none;">Pilih LP untuk driver baru.</div>
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:12px;">
        <button id="absen-cancel" class="btn-main" style="background:#6c757d; flex:1;">Batal</button>
        <button id="absen-ok" class="btn-main" style="background:#28a745; flex:1;" disabled>Konfirmasi</button>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
